[env]
_.path = ["{{config_root}}/node_modules/.bin"]
NODE_ENV = "{{ env.NODE_ENV | default(value='development') }}"
MK_PORT = "{{ env.MK_PORT | default(value='35831') }}"

[tools]
bun = "latest"
node = "{{ env.NODE_VERSION | default(value='lts') }}"
rust = "stable"

# ------------------------------------------------------------------------------
# Setup / bootstrap
# ------------------------------------------------------------------------------

[tasks.setup]
alias = "s"
description = "Install project dependencies for current stack"
run = "bun install --cwd apps/client"

[tasks.clean]
description = "Clean build outputs"
run = "cargo clean --manifest-path apps/core/Cargo.toml"

# ------------------------------------------------------------------------------
# Client (apps/client)
# ------------------------------------------------------------------------------

[tasks."client:dev"]
description = "Run client Vite dev server"
run = "bun run --cwd apps/client dev"

[tasks."client:typecheck"]
description = "Type-check client"
run = "tsc -b --pretty false -p apps/client/tsconfig.app.json"

[tasks."client:build"]
description = "Build client assets (embedded by core)"
run = "bun run --cwd apps/client build"

# ------------------------------------------------------------------------------
# Core (apps/core)
# ------------------------------------------------------------------------------

[tasks."core:run"]
description = "Run Rust core (debug)"
run = "cargo run --manifest-path apps/core/Cargo.toml"

[tasks."core:check"]
description = "Check Rust core"
run = "cargo check --manifest-path apps/core/Cargo.toml"

[tasks."core:test"]
description = "Test Rust core"
run = "cargo test --manifest-path apps/core/Cargo.toml"

[tasks."core:build"]
description = "Build Rust core release binary"
run = "cargo build --release --manifest-path apps/core/Cargo.toml"

# ------------------------------------------------------------------------------
# CI / Release pipeline
# ------------------------------------------------------------------------------

[tasks.check]
description = "CI checks (typecheck + rust check + rust tests)"
depends = ["client:typecheck", "core:check", "core:test"]

[tasks.build]
alias = "b"
description = "Release build (client then core)"
depends = ["client:build", "core:build"]

[tasks.release]
description = "Run full release pipeline (setup -> check -> build)"
depends = ["setup", "check", "build"]

[tasks.ci]
description = "CI pipeline alias (setup -> check -> build)"
depends = ["setup", "check", "build"]
