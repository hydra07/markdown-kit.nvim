name: CI

on:
  pull_request:
  push:
    branches: [master, main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup mise
        uses: jdx/mise-action@v2

      - name: Install toolchains
        run: mise install

      - name: Run CI pipeline
        run: mise run ci
