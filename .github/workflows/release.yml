name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-assets:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            archive_ext: tar.gz
          - os: macos-latest
            target: macos-x64
            archive_ext: tar.gz
          - os: windows-latest
            target: windows-x64
            archive_ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup mise
        uses: jdx/mise-action@v2

      - name: Install toolchains
        run: mise install

      - name: Setup dependencies
        run: mise run setup

      - name: Build client and core
        run: mise run build

      - name: Prepare release bundle (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          OUT_DIR="dist/release/markdown-kit-nvim-${VERSION}-${{ matrix.target }}"
          mkdir -p "${OUT_DIR}/nvim/bin"
          cp apps/core/target/release/mk-core "${OUT_DIR}/nvim/bin/"
          cp -R nvim/. "${OUT_DIR}/nvim/"
          cp README.md "${OUT_DIR}/README.md"
          tar -C dist/release -czf "dist/release/markdown-kit-nvim-${VERSION}-${{ matrix.target }}.tar.gz" "markdown-kit-nvim-${VERSION}-${{ matrix.target }}"

      - name: Prepare release bundle (windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $version = "${env:GITHUB_REF_NAME}"
          $outDir = "dist/release/markdown-kit-nvim-$version-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path "$outDir/nvim/bin" | Out-Null
          New-Item -ItemType Directory -Force -Path "$outDir/nvim" | Out-Null
          Copy-Item "apps/core/target/release/mk-core.exe" "$outDir/nvim/bin/mk-core.exe" -Force
          Copy-Item "nvim/*" "$outDir/nvim" -Recurse -Force
          Copy-Item "README.md" "$outDir/README.md" -Force
          Compress-Archive -Path "$outDir/*" -DestinationPath "dist/release/markdown-kit-nvim-$version-${{ matrix.target }}.zip" -Force

      - name: Publish runtime branch (unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          BRANCH="runtime-${{ matrix.target }}"
          RUNTIME_DIR="dist/runtime-${{ matrix.target }}"

          rm -rf "${RUNTIME_DIR}"
          mkdir -p "${RUNTIME_DIR}/plugin" "${RUNTIME_DIR}/lua" "${RUNTIME_DIR}/nvim/bin"
          cp -R nvim/plugin/. "${RUNTIME_DIR}/plugin/"
          cp -R nvim/lua/. "${RUNTIME_DIR}/lua/"
          cp apps/core/target/release/mk-core "${RUNTIME_DIR}/nvim/bin/"
          cp README.md "${RUNTIME_DIR}/README.md"

          git -C "${RUNTIME_DIR}" init
          git -C "${RUNTIME_DIR}" checkout -b "${BRANCH}"
          git -C "${RUNTIME_DIR}" config user.name "github-actions[bot]"
          git -C "${RUNTIME_DIR}" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "${RUNTIME_DIR}" add .
          git -C "${RUNTIME_DIR}" commit -m "runtime: ${VERSION} (${{ matrix.target }})"
          git -C "${RUNTIME_DIR}" remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git -C "${RUNTIME_DIR}" push --force origin "${BRANCH}"

      - name: Publish runtime branch (windows)
        if: runner.os == 'Windows'
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${env:GITHUB_REF_NAME}"
          $branch = "runtime-${{ matrix.target }}"
          $runtimeDir = "dist/runtime-${{ matrix.target }}"

          if (Test-Path $runtimeDir) { Remove-Item -Recurse -Force $runtimeDir }
          New-Item -ItemType Directory -Force -Path "$runtimeDir/plugin" | Out-Null
          New-Item -ItemType Directory -Force -Path "$runtimeDir/lua" | Out-Null
          New-Item -ItemType Directory -Force -Path "$runtimeDir/nvim/bin" | Out-Null

          Copy-Item "nvim/plugin/*" "$runtimeDir/plugin" -Recurse -Force
          Copy-Item "nvim/lua/*" "$runtimeDir/lua" -Recurse -Force
          Copy-Item "apps/core/target/release/mk-core.exe" "$runtimeDir/nvim/bin/mk-core.exe" -Force
          Copy-Item "README.md" "$runtimeDir/README.md" -Force

          git -C $runtimeDir init
          git -C $runtimeDir checkout -b $branch
          git -C $runtimeDir config user.name "github-actions[bot]"
          git -C $runtimeDir config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C $runtimeDir add .
          git -C $runtimeDir commit -m "runtime: $version (${{ matrix.target }})"
          git -C $runtimeDir remote add origin "https://x-access-token:$env:GH_TOKEN@github.com/${env:GITHUB_REPOSITORY}.git"
          git -C $runtimeDir push --force origin $branch

      - name: Upload assets
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/release/*.${{ matrix.archive_ext }}

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-assets
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/release

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/release/**/*.*
          generate_release_notes: true
